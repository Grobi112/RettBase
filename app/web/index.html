<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="RettBase – WebApp für Einsätze, Wachbuch, Checklisten und mehr.">
  <meta name="rettbase-version" content="1.0.9">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="RettBase">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>RettBase</title>
  <link rel="manifest" href="manifest.json">
</head>
<body style="margin:0;background:#1E1F26;min-height:100vh">
  <div id="flutter-init-loader" class="splash-loader">
    <img src="img/rettbase_splash.png" alt="RettBase" class="splash-logo">
    <div class="splash-bar"><div class="splash-bar-inner"></div></div>
  </div>
  <style>
    .splash-loader{position:fixed;inset:0;background:#1E1F26;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
    .splash-logo{width:auto;height:140px}
    .splash-bar{width:240px;height:8px;background:rgba(255,255,255,0.15);border-radius:4px;margin-top:32px;overflow:hidden}
    .splash-bar-inner{width:40%;height:100%;background:linear-gradient(90deg,#0ea5e94d,#0ea5e9,#fff,#0ea5e9,#0ea5e94d);border-radius:4px;animation:shimmer 1.8s ease-in-out infinite}
    @media (max-width:399px){
      .splash-logo{height:100px}
      .splash-bar{width:180px;margin-top:24px}
    }
    @keyframes shimmer{0%,100%{transform:translateX(-100%)}50%{transform:translateX(250%)}}
  </style>
  <script>
    (function(){
      if(!('serviceWorker' in navigator)) return;
      var _reg=navigator.serviceWorker.register.bind(navigator.serviceWorker);
      navigator.serviceWorker.register=function(url,opts){
        if(typeof url==='string'&&url.indexOf('flutter_service_worker')>=0){
          if(navigator.serviceWorker.controller){
            return navigator.serviceWorker.ready.then(function(r){return r;});
          }
          return _reg(url,opts);
        }
        return _reg(url,opts);
      };
    })();
    window.addEventListener('flutter-first-frame',function(){var e=document.getElementById('flutter-init-loader');if(e)e.remove()});
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
