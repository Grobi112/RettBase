<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="RettBase – WebApp für Einsätze, Wachbuch, Checklisten und mehr.">
  <meta name="rettbase-version" content="1.0.76">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="RettBase">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>RettBase</title>
  <link rel="manifest" href="manifest.json">
  <!-- Preconnect für schnellere Verbindung zu Firebase & Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firebase.googleapis.com">
  <link rel="preconnect" href="https://firebaseapp.com">
  <!-- Preload kritische Ressourcen -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preload" href="img/rettbase-logo.png" as="image">
</head>
<body style="margin:0;background:linear-gradient(135deg,#243D5C 0%,#1D3557 55%,#152840 100%);min-height:100vh">
  <!-- Flutter rendert hier (nicht body ersetzen) – Loader bleibt als Overlay erhalten -->
  <div id="flutter_host" style="position:fixed;inset:0;background:linear-gradient(135deg,#243D5C 0%,#1D3557 55%,#152840 100%);z-index:1"></div>
  <!-- Ladebildschirm: bleibt bis Flutter den gesamten Ladeprozess abgeschlossen hat -->
  <div id="flutter-init-loader" class="splash-loader">
    <img src="img/rettbase-logo.png" alt="RettBase" class="splash-logo">
    <div class="splash-bar"><div class="splash-bar-fill" id="splash-bar-fill"></div></div>
  </div>
  <style>
    .splash-loader{position:fixed;inset:0;background:linear-gradient(135deg,#243D5C 0%,#1D3557 55%,#152840 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.2s ease-out}
    .splash-logo{width:auto;height:120px}
    .splash-bar{width:240px;height:8px;background:rgba(255,255,255,0.15);border-radius:4px;margin-top:32px;overflow:hidden}
    .splash-bar-fill{width:0%;height:100%;background:#4EA8DE;border-radius:4px;transition:width 0.15s ease-out}
  </style>
  <script>
    (function(){
      var fill=document.getElementById('splash-bar-fill');
      if(!fill)return;
      var start=Date.now(),dur=2000,phase1End=0.5;
      function tick(){
        if(!fill.parentNode||fill.dataset.phase2==='true')return;
        var elapsed=Date.now()-start;
        var p=Math.min(phase1End,elapsed/dur*phase1End);
        fill.style.width=(p*100)+'%';
        if(p<phase1End)requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
    (function(){
      if(!('serviceWorker' in navigator)) return;
      var _reg=navigator.serviceWorker.register.bind(navigator.serviceWorker);
      navigator.serviceWorker.register=function(url,opts){
        if(typeof url==='string'&&url.indexOf('flutter_service_worker')>=0){
          if(navigator.serviceWorker.controller){
            return navigator.serviceWorker.ready.then(function(r){return r;});
          }
          return _reg(url,opts);
        }
        return _reg(url,opts);
      };
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
