# Web-App bauen – manueller Upload zu Strato
# Läuft bei jedem Push auf main (und optional manuell).
# Build-Artefakt kann unter Actions → Run → Artifacts heruntergeladen werden.

name: WebApp bauen

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manueller Start unter Actions → "WebApp bauen" → Run workflow

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Chrome installieren
        uses: browser-actions/setup-chrome@v2

      - name: Flutter einrichten
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Umgebung prüfen
        run: flutter doctor -v
        working-directory: app

      - name: Abhängigkeiten installieren
        run: |
          flutter clean
          flutter pub get
        working-directory: app

      - name: Web-App bauen
        run: flutter build web --release --no-wasm-dry-run
        working-directory: app

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: webapp-build
          path: app/build/web/
