# Automatisches Deployment der RettBase-WebApp zu Strato
# Läuft bei jedem Push auf main (und optional manuell).
# Die Flutter-App liegt in app/ – Workflow muss working-directory nutzen.

name: Deploy WebApp zu Strato

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manueller Start unter Actions → "Deploy WebApp zu Strato" → Run workflow

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Chrome installieren
        uses: browser-actions/setup-chrome@v2

      - name: Flutter einrichten
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Umgebung prüfen
        run: flutter doctor -v
        working-directory: app

      - name: Abhängigkeiten installieren
        run: |
          flutter clean
          flutter pub get
        working-directory: app

      - name: Web-App bauen
        run: |
          flutter build web --release --no-wasm-dry-run --verbose 2>&1 | tee build.log
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            echo "=== Letzte 150 Zeilen des Build-Logs (Fehlerdetails) ==="
            tail -150 build.log
          fi
          exit $exit_code
        working-directory: app

      - name: Zu Strato hochladen (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: app/build/web/
          server-dir: ${{ secrets.FTP_SERVER_DIR || './' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
